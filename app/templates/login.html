<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FinWise AI — Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f8f9fa; }
    .login-card { max-width: 380px; margin: 100px auto; }
  </style>
</head>
<body>
<div class="login-card card p-4 shadow-sm">
  <h4 class="mb-1 text-center fw-bold d-flex align-items-center justify-content-center gap-2">
    <svg width="28" height="23" viewBox="0 0 32 26" fill="none" aria-hidden="true">
      <rect x="1" y="8" width="17" height="16" rx="3" fill="#4ade80" fill-opacity="0.45"/>
      <rect x="13" y="2" width="17" height="16" rx="3" fill="#4ade80"/>
    </svg>
    FinWise
  </h4>
  <p class="text-muted text-center small mb-4">Sign in to your account</p>

  {% if error %}
  <div class="alert alert-danger py-2 small">{{ error }}</div>
  {% endif %}

  <form method="post" action="/login">
    <div class="mb-3">
      <label class="form-label">Username</label>
      <input type="text" name="username" class="form-control" autofocus required>
    </div>
    <div class="mb-3">
      <label class="form-label">Password</label>
      <input type="password" name="password" class="form-control" required>
    </div>
    <button class="btn btn-primary w-100">Sign In</button>
  </form>
</div>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</body>
</html>
