<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FinWise</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background: #f0f4fb; color: #1e293b; }

    /* Dark top band */
    .top-band { background: #0d1121; box-shadow: 0 4px 24px rgba(0,0,0,0.28); }
    .top-band .text-muted { color: #94a3b8 !important; }
    .top-band h6, .top-band label, .top-band .fw-semibold { color: #f1f5f9; }
    .top-band .card { color: #1e293b; box-shadow: 0 2px 12px rgba(0,0,0,0.22); }
    .top-band .card .text-muted { color: #64748b !important; }
    .top-band .card h6, .top-band .card label,
    .top-band .card .fw-semibold { color: #1e293b; }

    /* Cards */
    .card { background: #ffffff; border: 1px solid #e2e8f0; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }

    /* Navbar transparent inside dark band */
    .navbar { background: transparent !important; border-bottom: 1px solid rgba(255,255,255,0.08); }
    .navbar-brand { font-weight: 700; letter-spacing: 0.3px; font-size: 1.15rem; }

    /* Stat colors */
    .stat-card .display-6 { font-weight: 700; }
    .income-color  { color: #16a34a; }
    .expense-color { color: #dc2626; }
    .alltime-color { color: #2563eb; }
    .net-positive  { color: #16a34a; }
    .net-negative  { color: #dc2626; }
    .border-bottom { border-color: #e2e8f0 !important; }
    .text-muted    { color: #64748b !important; }

    /* Insight panel */
    .insight-panel { background: rgba(99,102,241,0.06); border: 1px solid rgba(99,102,241,0.20); border-radius: 10px; }

    /* Chat bubbles */
    .chat-bubble-user { background: #4f46e5; color: #fff; border-radius: 18px 18px 4px 18px; }
    .chat-bubble-ai   { background: #f1f5f9; color: #1e293b; border-radius: 18px 18px 18px 4px; border: 1px solid #e2e8f0; }
    .chat-bubble-ai ol, .chat-bubble-ai ul { padding-left: 1.25rem; margin-bottom: 0.5rem; }
    .chat-bubble-ai p  { margin-bottom: 0.4rem; }
    .chat-bubble-ai p:last-child { margin-bottom: 0; }
  </style>
</head>
<body>

<!-- Dark top band: navbar + page-specific hero content -->
<div class="top-band">
  <nav class="navbar navbar-dark">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center gap-2" href="/">
        <svg width="32" height="26" viewBox="0 0 32 26" fill="none" aria-hidden="true">
          <rect x="1" y="8" width="17" height="16" rx="3" fill="#4ade80" fill-opacity="0.45"/>
          <rect x="13" y="2" width="17" height="16" rx="3" fill="#4ade80"/>
        </svg>
        FinWise
      </a>
      <div class="d-flex align-items-center gap-3">
        <a href="/" class="nav-link text-white">Dashboard</a>
        <a href="/transactions" class="nav-link text-white">Transactions</a>
        <a href="/reports" class="nav-link text-white"><i class="bi bi-bar-chart-line"></i> Reports</a>
        <a href="/chat" class="nav-link text-white"><i class="bi bi-chat-dots"></i> AI Advisor</a>
        <a href="/settings" class="nav-link text-white"><i class="bi bi-sliders"></i> Settings</a>
        {% if username %}
        <span class="text-white-50 small border-start border-secondary ps-3">
          <i class="bi bi-person-circle"></i> {{ username }}
        </span>
        <a href="/logout" class="btn btn-sm btn-outline-light py-0 px-2">Sign out</a>
        {% endif %}
      </div>
    </div>
  </nav>
  {% block dark_header %}{% endblock %}
</div>

<!-- Light content area -->
<div class="container py-4">
  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
