<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FinWise AI</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background: #f0f4fb; color: #1e293b; }
    .card { background: #ffffff; border: 1px solid #e2e8f0; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
    .navbar.bg-dark { background: #0a0c15 !important; border-bottom: 1px solid #1e2238; }
    .navbar-brand { font-weight: 700; letter-spacing: 1px; }
    .stat-card .display-6 { font-weight: 700; }
    .income-color  { color: #16a34a; }
    .expense-color { color: #dc2626; }
    .alltime-color { color: #2563eb; }
    .net-positive  { color: #16a34a; }
    .net-negative  { color: #dc2626; }
    .border-bottom { border-color: #e2e8f0 !important; }
    .text-muted    { color: #64748b !important; }
    .insight-panel { background: rgba(99,102,241,0.06); border: 1px solid rgba(99,102,241,0.20); border-radius: 10px; }
    .chat-bubble-user { background: #4f46e5; color: #fff; border-radius: 18px 18px 4px 18px; }
    .chat-bubble-ai   { background: #f1f5f9; color: #1e293b; border-radius: 18px 18px 18px 4px; border: 1px solid #e2e8f0; }
    .chat-bubble-ai ol, .chat-bubble-ai ul { padding-left: 1.25rem; margin-bottom: 0.5rem; }
    .chat-bubble-ai p  { margin-bottom: 0.4rem; }
    .chat-bubble-ai p:last-child { margin-bottom: 0; }
  </style>
</head>
<body>
<nav class="navbar navbar-dark bg-dark mb-4">
  <div class="container">
    <a class="navbar-brand" href="/"><i class="bi bi-graph-up-arrow"></i> FinWise AI</a>
    <div class="d-flex gap-3">
      <a href="/" class="nav-link text-white">Dashboard</a>
      <a href="/transactions" class="nav-link text-white">Transactions</a>
      <a href="/reports" class="nav-link text-white"><i class="bi bi-bar-chart-line"></i> Reports</a>
      <a href="/chat" class="nav-link text-white"><i class="bi bi-chat-dots"></i> AI Advisor</a>
      <a href="/settings" class="nav-link text-white"><i class="bi bi-sliders"></i> Settings</a>
    </div>
  </div>
</nav>
<div class="container pb-5">
  {% block content %}{% endblock %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
